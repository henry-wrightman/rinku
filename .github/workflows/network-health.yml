name: Network Health

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      expect_load:
        description: 'Fail if checkpoints stall (activity bot expected online)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      run_load_burst:
        description: 'Run a short activity-bot-v2 burst before checks'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  GENESIS: https://rinku-genesis.fly.dev
  VAL1: https://rinku-validator-1.fly.dev
  VAL2: https://rinku-validator-2.fly.dev

jobs:
  health-check:
    name: Testnet Node Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Restore prior checkpoint heights
        uses: actions/cache@v6
        with:
          path: .network-health-heights.json
          key: network-health-heights-${{ github.run_id }}
          restore-keys: |
            network-health-heights-

      - name: Optional load burst (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_load_burst == 'true' }}
        run: |
          echo "Running 90s activity-bot-v2 burst against testnet..."
          RINKU_NODE_URLS="$GENESIS,$VAL1,$VAL2" \
            npx tsx scripts/activity-bot-v2.ts --mode=realistic --accounts=4 --duration=90

      - name: Health + peers + consensus + stall tracking
        env:
          PREV_HEIGHTS_FILE: .network-health-heights.json
          MIN_PEER_COUNT: "1"
          MAX_HEIGHT_SPREAD: "2"
          # Idle without bot is expected; only fail on age/stall when expect_load=true
          EXPECT_LOAD: ${{ github.event_name == 'workflow_dispatch' && inputs.expect_load == 'true' && 'true' || 'false' }}
          MAX_CHECKPOINT_AGE_MS: ${{ github.event_name == 'workflow_dispatch' && inputs.expect_load == 'true' && '1800000' || '0' }}
          STALL_FAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.expect_load == 'true' && 'true' || 'false' }}
        run: |
          npx tsx scripts/check-network-health.ts "$GENESIS" "$VAL1" "$VAL2"

      - name: Persist checkpoint heights for next interval
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .network-health-heights.json
          key: network-health-heights-${{ github.run_id }}

  deep-validation:
    name: Testnet protocol validation
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Build @rinku/core (required by validate-testnet.ts)
        run: npm run build -w @rinku/core

      - name: Validate genesis node state (pruned-DAG aware)
        run: npx tsx scripts/validate-testnet.ts ${{ env.GENESIS }}

      - name: Validate multi-node consensus
        run: npx tsx scripts/validate-multi-node.ts ${{ env.GENESIS }} ${{ env.VAL1 }} ${{ env.VAL2 }}
