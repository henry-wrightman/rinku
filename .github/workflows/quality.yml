name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-quality:
    name: Rust fmt / clippy / audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-quality-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (rinku-core hard gate)
        run: cargo clippy -p rinku-core --all-targets -- -D warnings

      - name: Clippy (workspace)
        # Fails on clippy/compiler errors. Warning debt in rinku-node is tracked separately;
        # -D warnings is enforced on rinku-core above.
        run: cargo clippy --all-targets --workspace

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        # Uses .cargo/audit.toml allowlist — see docs/security/audit-allowlist.md
        run: cargo audit

  node-security:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Audit npm dependencies (high+)
        # Hard gate with documented allowlist — docs/security/npm-audit-allowlist.json
        run: node scripts/check-npm-audit.mjs

  release-build:
    name: Release build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binary (matches Dockerfile.fly)
        run: cargo build --release -p rinku-node

      - name: Verify binary exists
        run: test -x target/release/rinku-node
