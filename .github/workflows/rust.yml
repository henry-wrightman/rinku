name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build
        run: cargo build --verbose

  test-release-features:
    name: Test / release features
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run rinku-node tests (zk feature)
        run: cargo test -p rinku-node --features zk --verbose

  test-core:
    name: Test / rinku-core
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run rinku-core tests
        run: cargo test -p rinku-core --verbose

  test-node:
    name: Test / rinku-node
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run rinku-node tests
        run: cargo test -p rinku-node --verbose

  test-contracts:
    name: Test / rinku-contract-sdk
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run contract SDK tests
        run: cargo test -p rinku-contract-sdk --verbose
