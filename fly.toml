# Fly.io configuration for Rinku Rust Node
# Deploy with: fly deploy --dockerfile Dockerfile.fly
#
# This deploys ONLY the Rust node (API + consensus + metrics)
# Explorer remains on Replit deployment

app = "rinku-node"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  RUST_LOG = "info"
  API_PORT = "8080"
  GOSSIP_ENABLED = "true"
  GOSSIP_INTERVAL_MS = "5000"
  CHECKPOINT_INTERVAL_MS = "30000"
  NODE_ID = "fly-node-1"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "rinku_data"
  destination = "/data"
  initial_size = "1gb"

[checks]
  [checks.health]
    type = "http"
    method = "GET"
    path = "/api/sync/status"
    port = 8080
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"

  [checks.metrics]
    type = "http"
    method = "GET"
    path = "/metrics"
    port = 8080
    interval = "60s"
    timeout = "10s"
