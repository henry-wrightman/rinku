# Fly.io configuration for Rinku Rust Node
# Deploy with: fly deploy --dockerfile Dockerfile.fly
#
# This deploys ONLY the Rust node (API + P2P consensus)
# Explorer remains on Replit deployment
#
# IMPORTANT: For P2P port 4001, allocate a dedicated IPv4:
#   fly ips allocate-v4 --app <app-name>
#
# MULTI-NODE TESTNET SETUP:
# 1. Create app: fly apps create rinku-genesis
# 2. Allocate IPv4: fly ips allocate-v4 --app rinku-genesis
# 3. Deploy: fly deploy --dockerfile Dockerfile.fly --app rinku-genesis
# 4. Get bootstrap info: curl https://rinku-genesis.fly.dev/api/bootstrap
# 5. Get IP: fly ips list --app rinku-genesis
# 6. For additional nodes, set env vars:
#    fly secrets set -a rinku-validator-1 \
#      P2P_BOOTSTRAP_PEERS="/ip4/<GENESIS_IP>/tcp/4001/p2p/<PEER_ID>" \
#      GENESIS_VALIDATORS="<ADDRESS>:<BLS_KEY>"

app = "rinku-node"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  RUST_LOG = "rinku_node=info,rinku_node::gossip=info"
  API_PORT = "8080"
  P2P_PORT = "4001"
  DATA_DIR = "/data"
  CHECKPOINT_INTERVAL_MS = "30000"
  # P2P Bootstrap - set via `fly secrets set` for non-genesis nodes
  # P2P_BOOTSTRAP_PEERS = "/ip4/<IP>/tcp/4001/p2p/<PEER_ID>"
  # GENESIS_VALIDATORS = "<ADDRESS>:<BLS_PUBLIC_KEY>"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[services]]
  protocol = "tcp"
  internal_port = 4001

  [[services.ports]]
    port = 4001

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "rinku_data"
  destination = "/data"
  initial_size = "1gb"

[checks]
  [checks.health]
    type = "http"
    method = "GET"
    path = "/health"
    port = 8080
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"

  [checks.metrics]
    type = "http"
    method = "GET"
    path = "/metrics"
    port = 8080
    interval = "60s"
    timeout = "10s"
