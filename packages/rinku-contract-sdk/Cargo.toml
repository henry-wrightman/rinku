[package]
name = "rinku-contract-sdk"
version = "0.1.0"
edition = "2021"
description = "SDK for writing Rinku smart contracts that compile to WebAssembly"
license = "MIT"

[lib]
crate-type = ["rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
default = []
