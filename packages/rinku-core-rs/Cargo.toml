[package]
name = "rinku-core"
version = "0.1.0"
edition = "2021"
description = "Rinku distributed ledger core library - cryptography, DAG, and Merkle trees"
license = "MIT"
repository = "https://github.com/rinku-ledger/rinku"
keywords = ["blockchain", "dag", "distributed-ledger", "cryptography"]
categories = ["cryptography", "data-structures"]

[lib]
name = "rinku_core"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[dependencies]
# Cryptography
p256 = { version = "0.13", features = ["ecdsa", "sha256"] }
sha2 = "0.10"
rand = "0.8"
hex = "0.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "1.0"

# Async (for future WASM/N-API bindings)
# tokio = { version = "1", features = ["rt-multi-thread", "macros"], optional = true }

[dev-dependencies]

[features]
default = []

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
