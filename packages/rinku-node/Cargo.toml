[package]
name = "rinku-node"
version.workspace = true
edition = "2021"
description = "Rinku node implementation with consensus, gossip, and API server"
license.workspace = true

[[bin]]
name = "rinku-node"
path = "src/main.rs"

[features]
default = []
zk = ["ark-bn254", "ark-groth16", "ark-serialize", "ark-std", "ark-ff", "ark-ec", "ark-relations", "light-poseidon"]
p2p = ["libp2p"]
full = ["zk", "p2p"]

[dependencies]
rinku-core = { path = "../rinku-core" }

# Async runtime
tokio = { workspace = true }

# HTTP server
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }

# Networking/Gossip (optional - heavy dependency)
libp2p = { workspace = true, optional = true }

# Persistence
sled = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Telemetry
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
prometheus = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Time
chrono = { workspace = true }

# Utilities
num_cpus = { workspace = true }
reqwest = { workspace = true }
rand = { workspace = true }
hex = { workspace = true }
blst = { workspace = true }
flate2 = { workspace = true }
base64 = { workspace = true }
sha2 = { workspace = true }

# ZK-SNARKs (optional - heavy dependencies)
ark-bn254 = { workspace = true, optional = true }
ark-groth16 = { workspace = true, optional = true }
ark-serialize = { workspace = true, optional = true }
ark-std = { workspace = true, optional = true }
ark-ff = { workspace = true, optional = true }
ark-ec = { workspace = true, optional = true }
ark-relations = { workspace = true, optional = true }
light-poseidon = { workspace = true, optional = true }

[dev-dependencies]
proptest = { workspace = true }
tempfile = "3"
